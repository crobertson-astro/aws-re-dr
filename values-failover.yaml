# Sentinel Agent configuration
# The Sentinel Agent monitors the health and status of Agent components pods
# and reports the health status and metrics to the Astro Deployment API server
sentinel:
  # Enable or disable the Sentinel Agent setup
  # Default: true (enabled)
  enabled: true

  # The Docker image for the Sentinel Agent
  # Update this to match your Sentinel image version
  image: images.astronomer.cloud/baseimages/astro-remote-execution-sentinel:1.6.0

  # The imagePullPolicy for the Sentinel Agent
  # ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  imagePullPolicy: IfNotPresent

  # The resources to be used for the Sentinel Pod
  resources:
    limits:
      cpu: "500m"
      ephemeral-storage: "1Gi"
      memory: "256Mi"
    requests:
      cpu: "100m"
      ephemeral-storage: "1Gi"
      memory: "128Mi"

  # Extra environment variables that need to be passed to the Sentinel
  # This is useful to set environment variables that are specific to the Sentinel
  env: []

  # The port for the Sentinel HTTP server
  port: 8080

  # The liveness probe for the Sentinel Pod
  # This is used to check if the Sentinel Pod is alive and healthy
  livenessProbe:
    httpGet:
      path: health
      port: 8080 # The port for the Sentinel HTTP server, keep it same as the port set for sentinel service above
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
    successThreshold: 1
    timeoutSeconds: 5

  # The readiness probe for the Sentinel Pod
  # This is used to check if the Sentinel Pod is ready to monitor Agent components
  readinessProbe:
    httpGet:
      path: health
      port: 8080 # The port for the Sentinel HTTP server, keep it same as the port set for sentinel service above
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
    successThreshold: 1
    timeoutSeconds: 5

  # Pod security context for the Sentinel Pod
  # By default, the Sentinel runs as a non-root user with UID 5000
  # and the group ID is set to 5000
  # For example one can use this field to override the default security context to
  # install the Sentinel on a namespace with Pod security standard set to restricted.
  # The podSecurityContext in that case would look like:
  # podSecurityContext:
  #   runAsUser: 5000
  #   fsGroup: 5000
  #   runAsNonRoot: true
  #   seccompProfile:
  #     type: RuntimeDefault

  # Security context for the Sentinel container
  # For example one can use this field to override the default security context to
  # install the Sentinel on a namespace with Pod security standard set to restricted.
  # The containerSecurityContext in that case would look like:
  # containerSecurityContext:
  #   allowPrivilegeEscalation: false
  #   readOnlyRootFilesystem: true
  #   capabilities:
  #     drop:
  #       - ALL
  containerSecurityContext: {}

  # The init containers to be added to the Sentinel Pod
  # This is useful to set any initial setup that needs to be done before the Sentinel Pod starts
  initContainers: []

  # The extra containers to be added to the Sentinel Pod as sidecars
  # This is useful to set any side process that needs to be run along with the Sentinel Pod
  extraContainers: []

  # The volumes to be mounted in the Sentinel Pod
  # This is useful to mount any external volumes in the Sentinel Pod
  volumes: []

  # The mount information for the volumes to be mounted in the Sentinel container
  # This is useful to mount any external volumes in the Sentinel container
  volumeMounts: []

  # Node selector for the Sentinel pod
  # This can be used to schedule the Sentinel pod on a specific node or node group
  # For example, to schedule the Sentinel pod on a node with label "monitoring=true"
  # nodeSelector:
  #   monitoring: "true"

  # Sentinel configuration
  # If provided, this will override the auto-generated sentinel.yaml configuration
  # Use this if you need fine-grained control over the Sentinel configuration
  # The value should be a complete YAML configuration for Sentinel
  # Example:
  # config: |
  # heartbeat_interval: "60s"
  # reconcile_interval: "30s"
  # log_level: "info"
  # platform:
  #   type: "kubernetes" # required field
  #   kubernetes:
  #     namespace: "astro-agent" # required field
  #     agent_component_app_label: "astro-agent"
  #     agent_service_port_name: "http"
  #     informer_resync_period: "10m"
  #     qps: 5.0
  #     burst: 10
  #     event_collection_enabled: true
  # api_server:
  #   base_url: "https://cluster-api.astronomer.io" # Same as the Astro Deployment API URL, required field
  #   timeout: "30s"
  #   retry_count: 3
  #   retry_delay: "5s"
  #   api_token: "astro_agent_api_token" # api token or api token file must be provided
  #   api_token_file: "/app/secrets/token" # api token or api token file must be provided
  #   api_token_refresh_interval: "60s"
  # agent_auth:
  #   agent_auth_secret: "sentinel-auth-secret" # sentinel auth secret or sentinel auth secret file must be provided
  #   agent_auth_secret_file: "/app/secrets/sentinel-auth/secret" # sentinel auth secret or sentinel auth secret file must be provided
  # health:
  #   port: 8080 # The port for the health check HTTP server
  #   timeout: "5s" # The timeout for the health check HTTP server
  # feature:
  #   agent_monitoring: true
  # Affinity rules for the pod
  # affinity: {}
  # Tolerations for the pod
  # tolerations: []
